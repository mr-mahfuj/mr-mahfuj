<svg width="700" height="120" viewBox="0 0 700 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .bg { fill: #0d1117; }
      .letter { font-family: 'Share Tech Mono', 'Courier New', monospace; font-size: 72px; font-weight: bold; fill: #00ff88; }
      .cursor { fill: #00ff88; }
      .scanline { fill: none; stroke: #00ff88; stroke-width: 0.3; opacity: 0.08; }

      /* Each letter appears one by one */
      .l1 { opacity: 0; animation: appear 0.1s 0.3s forwards; }
      .l2 { opacity: 0; animation: appear 0.1s 0.65s forwards; }
      .l3 { opacity: 0; animation: appear 0.1s 1.0s forwards; }
      .l4 { opacity: 0; animation: appear 0.1s 1.35s forwards; }
      .l5 { opacity: 0; animation: appear 0.1s 1.7s forwards; }
      .l6 { opacity: 0; animation: appear 0.1s 2.05s forwards; }

      /* Cursor blinks between each letter */
      .cur { animation: blink 0.3s step-end infinite; }

      /* Glow pulses after full name appears */
      .glow { animation: glow 2s 2.5s ease-in-out infinite alternate; }

      @keyframes appear {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes glow {
        from { filter: drop-shadow(0 0 4px #00ff88) drop-shadow(0 0 8px #00ff8866); }
        to   { filter: drop-shadow(0 0 12px #00ff88) drop-shadow(0 0 24px #00ff8888); }
      }

      /* Typing flicker on each letter as it appears */
      .l1 { animation: appear 0.1s 0.3s forwards, flicker 0.15s 0.3s; }
      .l2 { animation: appear 0.1s 0.65s forwards, flicker 0.15s 0.65s; }
      .l3 { animation: appear 0.1s 1.0s forwards, flicker 0.15s 1.0s; }
      .l4 { animation: appear 0.1s 1.35s forwards, flicker 0.15s 1.35s; }
      .l5 { animation: appear 0.1s 1.7s forwards, flicker 0.15s 1.7s; }
      .l6 { animation: appear 0.1s 2.05s forwards, flicker 0.15s 2.05s; }

      @keyframes flicker {
        0%   { opacity: 0; }
        30%  { opacity: 1; }
        60%  { opacity: 0.4; }
        100% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="700" height="120" class="bg" rx="8"/>

  <!-- Scanlines -->
  <line x1="0" y1="20" x2="700" y2="20" class="scanline"/>
  <line x1="0" y1="40" x2="700" y2="40" class="scanline"/>
  <line x1="0" y1="60" x2="700" y2="60" class="scanline"/>
  <line x1="0" y1="80" x2="700" y2="80" class="scanline"/>
  <line x1="0" y1="100" x2="700" y2="100" class="scanline"/>

  <!-- Animated name letters -->
  <g class="glow">
    <text x="28"  y="90" class="letter l1">M</text>
    <text x="118" y="90" class="letter l2">A</text>
    <text x="198" y="90" class="letter l3">H</text>
    <text x="285" y="90" class="letter l4">F</text>
    <text x="355" y="90" class="letter l5">U</text>
    <text x="438" y="90" class="letter l6">J</text>
  </g>

  <!-- Blinking cursor that moves with typing -->
  <rect class="cursor cur" x="510" y="20" width="8" height="66" rx="2"/>

  <!-- Corner decorations -->
  <text x="8" y="14" font-family="monospace" font-size="9" fill="#00ff8844">// BUILD_1505</text>
  <text x="580" y="114" font-family="monospace" font-size="9" fill="#00ff8844">SWE //</text>
</svg>
